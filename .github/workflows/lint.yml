name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: prek
    runs-on: ubuntu-latest
    env:
      ANSIBLE_LIBRARY: ./library
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: ansible-galaxy collection install -r requirements.yml --no-cache
      - run: prek run --all-files
