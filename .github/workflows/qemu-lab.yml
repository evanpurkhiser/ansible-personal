name: qemu-lab

on:
  pull_request:
  workflow_dispatch:

jobs:
  full-lab-apply:
    name: Full QEMU lab apply
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          set -euo pipefail
          python -m pip install ansible
          ansible-galaxy install -r requirements.yml
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils tmux

      - name: Run full two-phase qemu lab
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          qemu/server/run-qemu-server-apply.sh \
            --name ci-qemu-lab \
            --vm-dir "${{ runner.temp }}/ci-qemu-lab" \
            --ssh-port 2222 \
            --data-disk-size 8G \
            --no-kvm

      - name: Upload qemu lab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-lab-artifacts
          path: |
            ${{ runner.temp }}/ci-qemu-lab
            /tmp/boot-qemu-archbox-keyinject-*.log
          if-no-files-found: ignore
