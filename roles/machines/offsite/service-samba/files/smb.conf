[global]
   workgroup = PURKHISER
   server string = Evans Offsite NAS
   server role = standalone server
   log file = /var/log/samba/%m.log
   max log size = 50
   dns proxy = no
   map to guest = Bad User

[james-storage]
   path = /tank/james-storage
   browseable = yes
   writable = yes
   guest ok = yes
   guest only = yes
   force user = james
   create mask = 0664
   directory mask = 0775
