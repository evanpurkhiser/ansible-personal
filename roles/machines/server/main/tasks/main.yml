- name: Import common
  ansible.builtin.import_role: { name: common }

- name: Import pacsync
  ansible.builtin.import_role: { name: pacsync }

- name: Import personal arch repo
  ansible.builtin.import_role: { name: arch_repo_personal }

- name: Import paccache
  ansible.builtin.import_role: { name: paccache }

- name: Import systemd-timesyncd
  ansible.builtin.import_role: { name: systemd_timesyncd }

- name: Import aur
  ansible.builtin.import_role: { name: aur }

- name: Import ZFS
  tags: [zfs]
  ansible.builtin.import_role: { name: zfs }

- name: Install base packages
  tags: [packages]
  community.general.pacman:
    name:
      - man-db
      - man-pages
      - nfs-utils

      # Common tools
      - bash-completion
      - speedtest-cli
      - neovim
      - lsd
      - fzf
      - htop
      - atuin
      - tree
      - fd
      - jq
      - ripgrep
      - khard
      - ansible
      - gogcli
      - codespell
      - github-cli
      - mitmproxy
      - shfmt
      - tmux
      - tree-sitter-cli
      - unrar
      - unzip
      - wget
      - zip
      - wrangler

      # Other tools
      - lm_sensors
      - speedtest-cli

      # Sandboxing
      - bubblewrap

      # Services
      - nginx
      - dnsmasq
      - rsync
      - transmission-cli
      - sentry-cli
      - tailscale
      - podman
      - ufw

      # Required for triggering systemd sockets (transmission-helper)
      - socat

      # Languages
      - go
      - deno
      - nodejs
      - npm
      - rustup

# System configuration
- name: Enable linger for evan
  ansible.builtin.command: loginctl enable-linger evan
  args:
    creates: /var/lib/systemd/linger/evan

- name: Import sshd tasks
  ansible.builtin.import_tasks: sshd.yml
  tags: [sshd]

- name: Import network tasks
  ansible.builtin.import_tasks: network.yml
  tags: [network]

- name: Phase two install
  ansible.builtin.debug:
    msg: Phase two install marker

- name: Import hardware tasks
  ansible.builtin.import_tasks: hardware.yml
  tags: [hardware]

- name: Import pam-ssh-agent-auth tasks
  ansible.builtin.import_tasks: pam-ssh-agent.yml
  tags: [pam-ssh-agent]

# Services
- name: Import nfs role
  tags: [nfs]
  ansible.builtin.import_role: { name: machines/server/service-nfs }

