- name: Create agent libexec directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /usr/local/libexec/agents
    - /usr/local/libexec/agents/bin

- name: Install agent auth helper library
  ansible.builtin.copy:
    src: agent-auth-lib.sh
    dest: /usr/local/libexec/agents/agent-auth-lib.sh
    owner: root
    group: root
    mode: "0755"

- name: Install agent sudo shim
  ansible.builtin.copy:
    src: agent-sudo
    dest: /usr/local/libexec/agents/agent-sudo
    owner: root
    group: root
    mode: "0755"

- name: Link agent sudo shim into agent bin path
  ansible.builtin.file:
    src: /usr/local/libexec/agents/agent-sudo
    dest: /usr/local/libexec/agents/bin/sudo
    state: link
    owner: root
    group: root

- name: Install ssh-agent-proxy script
  ansible.builtin.copy:
    src: ssh-agent-proxy
    dest: /usr/local/bin/ssh-agent-proxy
    mode: "0755"

- name: Install ssh-agent-proxy systemd units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/
    mode: "0644"
  loop:
    - ssh-agent-proxy.socket
    - ssh-agent-proxy@.service
  notify: Systemd daemon-reload

- name: Install ssh-agent-proxy SSH key
  ansible.builtin.copy:
    content: "{{ ssh_agent_proxy_key }}"
    dest: /etc/ssh-agent-proxy-key
    mode: "0600"
    owner: root
    group: root

- name: Enable ssh-agent-proxy socket
  ansible.builtin.service:
    name: ssh-agent-proxy.socket
    state: started
    enabled: true
    daemon_reload: true
