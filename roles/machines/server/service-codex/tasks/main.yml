- name: Install codex
  community.general.pacman:
    name: openai-codex
    state: present

- name: Create codex libexec directory
  ansible.builtin.file:
    path: /usr/local/libexec/codex
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install codex remote-control wrapper
  ansible.builtin.copy:
    src: codex-remote-control
    dest: /usr/local/libexec/codex/remote-control
    owner: root
    group: root
    mode: "0755"
  notify: Restart codex

- name: Remove codex app-server wrapper
  ansible.builtin.file:
    path: /usr/local/libexec/codex/app-server
    state: absent

- name: Ensure codex config directory
  ansible.builtin.file:
    path: /home/evan/.config/codex
    state: directory
    owner: evan
    mode: "0700"

- name: Install codex systemd user service
  ansible.builtin.copy:
    src: codex.service
    dest: /etc/systemd/user/codex.service
    mode: "0644"
  notify:
    - Systemd user daemon-reload
    - Restart codex

- name: Enable codex user service
  ansible.builtin.systemd:
    name: codex
    state: started
    enabled: true
    daemon_reload: true
    scope: user
  become: true
  become_user: evan
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ machines_evan_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ machines_evan_uid }}/bus"
