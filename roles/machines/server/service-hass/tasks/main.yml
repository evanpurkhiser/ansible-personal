- name: Ensure hass config directory exists
  ansible.builtin.file:
    path: /var/lib/hass
    state: directory
    mode: "0755"

# HA's built-in backups land here. Living on the documents ZFS pool means
# zrepl picks them up in the hourly snapshot and replicates them offsite
# with the same retention as the rest of the pool.
- name: Ensure hass backup directory on ZFS
  ansible.builtin.file:
    path: /mnt/documents/backups/home-assistant
    state: directory
    owner: evan
    group: users
    mode: "0755"

- name: Ensure hass configuration
  notify: Restart home-assistant
  ansible.builtin.copy:
    src: home-assistant.yaml
    dest: /var/lib/hass/configuration.yaml
    mode: "0644"

- name: Ensure automations file
  ansible.builtin.file:
    path: /var/lib/hass/automations.yaml
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Ensure scripts folder
  ansible.builtin.file:
    path: /var/lib/hass/scripts.yaml
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Ensure hass secrets
  notify: Restart home-assistant
  ansible.builtin.template:
    src: home-assistant-secrets.yaml
    dest: /var/lib/hass/secrets.yaml
    mode: "0644"

- name: Ensure hass podman container
  containers.podman.podman_container:
    name: home-assistant
    image: ghcr.io/home-assistant/home-assistant:latest
    state: present
    network: host
    volume:
      - "/var/lib/hass:/config"
      - "/mnt/documents/backups/home-assistant:/config/backups"
      - "/etc/localtime:/etc/localtime:ro"
    device:
      - "/dev/zwave:/dev/zwave"
      - "/dev/zigbee:/dev/zigbee"
    label:
      io.containers.autoupdate: registry
    generate_systemd:
      path: /etc/systemd/system/
      restart_policy: always
      after:
        - dev-zwave.device
        - dev-zigbee.device
      new: true

- name: Ensure hass container is running
  ansible.builtin.systemd:
    name: container-home-assistant
    state: started
    enabled: true
    daemon_reload: true
