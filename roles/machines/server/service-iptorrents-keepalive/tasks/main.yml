- name: Install iptorrents-keepalive timer and service
  notify: Systemd daemon-reload
  with_items: [timer, service]
  ansible.builtin.copy:
    src: iptorrents-keepalive.{{ item }}
    dest: /etc/systemd/system/
    mode: "0644"

- name: Enable iptorrents-keepalive timer service
  ansible.builtin.service:
    name: iptorrents-keepalive.timer
    state: started
    enabled: true
