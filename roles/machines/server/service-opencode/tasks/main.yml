- name: Install opencode
  kewlfft.aur.aur:
    name: opencode-bin
    state: present
  become: true
  become_user: aur-builder

- name: Create opencode libexec directory
  ansible.builtin.file:
    path: /usr/local/libexec/opencode
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install opencode serve wrapper
  ansible.builtin.copy:
    src: opencode-serve
    dest: /usr/local/libexec/opencode/serve
    owner: root
    group: root
    mode: "0755"
  notify: Restart opencode

- name: Install import-environment systemd user service
  ansible.builtin.copy:
    src: import-environment.service
    dest: /etc/systemd/user/import-environment.service
    mode: "0644"
  notify: Systemd user daemon-reload

- name: Gather evan passwd entry
  ansible.builtin.getent:
    database: passwd
    key: evan
    split: ":"

- name: Set evan runtime uid
  ansible.builtin.set_fact:
    machines_evan_uid: "{{ ansible_facts.getent_passwd.evan[1] }}"

- name: Enable import-environment user service
  ansible.builtin.systemd:
    name: import-environment
    enabled: true
    scope: user
  become: true
  become_user: evan
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ machines_evan_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ machines_evan_uid }}/bus"

- name: Install opencode systemd user service
  ansible.builtin.copy:
    src: opencode.service
    dest: /etc/systemd/user/opencode.service
    mode: "0644"
  notify:
    - Systemd user daemon-reload
    - Restart import-environment
    - Restart opencode

- name: Enable opencode user service
  ansible.builtin.systemd:
    name: opencode
    state: started
    enabled: true
    scope: user
  become: true
  become_user: evan
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ machines_evan_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ machines_evan_uid }}/bus"
