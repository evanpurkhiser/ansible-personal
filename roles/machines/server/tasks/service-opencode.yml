- name: Install opencode
  kewlfft.aur.aur:
    name: opencode-bin
    state: present
  become: true
  become_user: aur-builder

- name: Install opencode systemd service
  ansible.builtin.copy:
    src: systemd/opencode.service
    dest: /etc/systemd/system/
    mode: "0644"
  notify: Systemd daemon-reload

- name: Enable opencode service
  ansible.builtin.service:
    name: opencode
    state: started
    enabled: true
    daemon_reload: true
